server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  # ====== 供应商配置 ======
  providers:
    ollama:
      url: http://localhost:11434
      # Ollama 不需要 API Key
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:sk-lcortjcyxumnoojkqgoizuvyjhrqqpzgigxzraqypmfojnqs}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
  # ====== 熔断策略 ======
  selection:
    failure-threshold: 2  # 连续失败 2 次触发熔断
    open-duration-ms: 30000   # 熔断持续 30 秒
  # ====== 流式配置 ======
  stream:
    message-chunk-size: 1   # 流式消息合并块大小
  # ====== Chat 模型组 ======
  chat:
    default-model: Qwen/Qwen3-8B   # 默认使用的模型
    deep-thinking-model: Qwen/Qwen3-8B   # 深度思考模型
    candidates:
      - id: Qwen/Qwen3-8B      # 唯一标识
        provider: siliconflow       # 关联供应商
        model: Qwen/Qwen3-8B        # 模型名称
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true       # 支持深度思考
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0          # 优先级最高
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
  # ====== Embedding 模型组 ======
  embedding:
    default-model: Qwen/Qwen3-Embedding-8B
    candidates:
      - id: Qwen/Qwen3-Embedding-8B
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}   # 向量维度
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2
  # ====== Rerank 模型组 ======
  rerank:
    default-model: Qwen/Qwen3-Reranker-8B
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: Qwen/Qwen3-Reranker-8B
        provider: siliconflow
        model: Qwen/Qwen3-Reranker-8B
        priority: 2
      - id: rerank-noop     # 空实现，兜底用
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false

logging:
  level:
    root: INFO
    com.nageoffer.ai.ragent: INFO